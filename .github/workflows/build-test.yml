name: Multi-Compiler Build And Test 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]
        c_compiler: [gcc-14, clang-18]
        include:
          - os: ubuntu-latest
            c_compiler: gcc-14
            cpp_compiler: g++-14
            extra_cmake_flags: ""
          - os: ubuntu-latest
            c_compiler: clang-18
            cpp_compiler: clang++-18
            extra_cmake_flags: "-DCMAKE_CXX_FLAGS=-stdlib=libc++ -DCMAKE_EXE_LINKER_FLAGS=-stdlib=libc++"

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
   
    - name: Install Dependencies and Compiler
      run: |
        sudo apt-get update

        if [ "${{ matrix.c_compiler }}" = "gcc-14" ]; then
          # Add the toolchain PPA to get access to newer GCC versions
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y g++-14
        elif [ "${{ matrix.c_compiler }}" = "clang-18" ]; then
          sudo apt-get install -y clang-18 libc++-18-dev libc++abi-18-dev
        fi

    - name: Configure CMake
      run: >
        cmake -B ${{github.workspace}}/build
        -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        -DCMAKE_C_COMPILER=${{matrix.c_compiler}}
        -DCMAKE_CXX_COMPILER=${{matrix.cpp_compiler}}
        ${{matrix.extra_cmake_flags}}

    - name: Build Project
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Run Tests
      working-directory: ${{github.workspace}}/build/tests
      run: ctest -C ${{env.BUILD_TYPE}}
